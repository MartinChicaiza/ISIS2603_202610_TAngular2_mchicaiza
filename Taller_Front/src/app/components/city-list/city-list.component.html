<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="mb-0">WeatherAndes — Ciudades</h2>
    <button class="btn btn-primary" (click)="toggleCreateForm()">
      {{ showCreateForm ? 'Cancelar' : 'Crear Ciudad' }}
    </button>
  </div>

  @if (showCreateForm) {
    <app-city-create
      (cityCreated)="onCityCreated()"
      (cancel)="showCreateForm = false">
    </app-city-create>
  }

  <table class="table table-striped table-hover mt-3">
    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Ciudad</th>
        <th>País</th>
        <th>Acción</th>
      </tr>
    </thead>
    <tbody>
      @for (city of cities; track city) {
        <tr>
          <td>{{ city.id }}</td>
          <td>{{ city.name }}</td>
          <td>{{ city.country.name }}</td>
          <td>
            <button class="btn btn-sm btn-outline-secondary" (click)="onSelectCity(city)">
              Ver Detalle
            </button>
          </td>
        </tr>
      }
    </tbody>
  </table>

  @if (selectedCity) {
    <app-city-detail [city]="selectedCity"></app-city-detail>
  }
</div>
